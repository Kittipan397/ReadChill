<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>แอดมิน - ReadChill</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <style>
        .admin-section {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 8px;
            margin-bottom: 2rem;
        }
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
        }
        .form-group input, .form-group select {
            width: 100%;
            padding: 0.5rem;
            background-color: var(--bg-color);
            color: var(--text-primary);
            border: 1px solid #444;
            border-radius: 4px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 1rem;
        }
        th, td {
            padding: 1rem;
            text-align: left;
            border-bottom: 1px solid #444;
        }
        .slip-link {
            color: var(--accent-color);
            text-decoration: underline;
        }
        .btn-sm {
            padding: 0.25rem 0.5rem;
            font-size: 0.9rem;
            margin-right: 0.5rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">ReadChill (Admin)</a>
        <div class="nav-links">
            <a href="index.html">กลับหน้าแรก</a>
        </div>
    </nav>

    <main class="container hidden" id="admin-content">
        <!-- ส่วนที่ 1: เพิ่มตอนใหม่ -->
        <section class="admin-section">
            <h2>อัปโหลดตอนใหม่ (Chapter)</h2>
            <div style="margin-top: 1rem;">
                <div class="form-group">
                    <label>ชื่อเรื่อง / ชื่อตอน</label>
                    <input type="text" id="add-title" placeholder="เช่น One Piece ตอนที่ 1000">
                </div>
                <div class="form-group">
                    <label>ลำดับตอน (ตัวเลข)</label>
                    <input type="number" id="add-chapter-num" placeholder="1000">
                </div>
                <div class="form-group">
                    <label>ประเภท (ฟรี / เสียเงิน)</label>
                    <select id="add-is-free">
                        <option value="true">อ่านฟรี</option>
                        <option value="false">เสียเงิน (ซื้อตอน)</option>
                    </select>
                </div>
                <div class="form-group hidden" id="price-group">
                    <label>ราคา (บาท)</label>
                    <input type="number" id="add-price" placeholder="5" value="5">
                </div>
                <div class="form-group">
                    <label>อัปโหลดรูปภาพ (เลือกได้หลายไฟล์เรียงตามลำดับ)</label>
                    <input type="file" id="add-images" accept="image/*" multiple>
                </div>
                <button id="add-chapter-btn" class="btn-primary">บันทึกตอนใหม่</button>
                <p id="add-msg" style="margin-top: 1rem;"></p>
            </div>
        </section>

        <!-- ส่วนที่ 2: จัดการรายการชำระเงิน -->
        <section class="admin-section">
            <h2>รายการชำระเงินที่รออนุมัติ (Pending Payments)</h2>
            <div style="overflow-x: auto;">
                <table>
                    <thead>
                        <tr>
                            <th>ผู้ใช้ (Email)</th>
                            <th>รหัสตอน</th>
                            <th>จำนวนเงิน</th>
                            <th>สลิป</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="payments-tbody">
                        <!-- รายการจะถูกแทรกด้วย Javascript -->
                    </tbody>
                </table>
            </div>
        </section>
    </main>

    <div id="unauthorized-msg" class="container" style="text-align: center; margin-top: 4rem;">
        <h2>กำลังตรวจสอบสิทธิ์...</h2>
    </div>

    <script type="module" src="js/firebase.js"></script>
    <script type="module" src="js/auth.js"></script>
    <script type="module" src="js/admin.js"></script>
</body>
</html>
