name: Deploy Go backend to Cloud Run

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up gcloud CLI
        uses: google-github-actions/setup-gcloud@v1
        with:
          project_id: ${{ secrets.GCP_PROJECT }}
          service_account_key: ${{ secrets.GCP_SA_KEY }}

      - name: Build and push image with Cloud Build
        run: |
          gcloud builds submit --tag gcr.io/${{ secrets.GCP_PROJECT }}/readchill-go-backend:latest ./readchill-go-backend

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy readchill-go-backend \
            --image gcr.io/${{ secrets.GCP_PROJECT }}/readchill-go-backend:latest \
            --region asia-southeast1 --platform managed \
            --allow-unauthenticated \
            --set-env-vars "ALLOWED_ORIGINS=https://read-chill.vercel.app,PORT=8080,SLIPOK_API_URL=${{ secrets.SLIPOK_API_URL }},SLIPOK_API_KEY=${{ secrets.SLIPOK_API_KEY }},ALLOWED_RECEIVER_ACCOUNT=${{ secrets.ALLOWED_RECEIVER_ACCOUNT }},ALLOWED_RECEIVER_NAME=${{ secrets.ALLOWED_RECEIVER_NAME }}"

      - name: Output service URL
        run: |
          gcloud run services describe readchill-go-backend --region=asia-southeast1 --platform=managed --format='value(status.url)'
