<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>สมัครสมาชิก - ReadChill</title>
    <meta name="description" content="เข้าสู่ระบบ ReadChill เพื่อบันทึกประวัติการอ่านและเรื่องโปรดของคุณ">
    <link rel="stylesheet" href="css/style.css?v=5">
    <!-- Ionicons -->
    <script type="module" src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@7.1.0/dist/ionicons/ionicons.js"></script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="images/logo.png">
</head>
<body>
    <!-- Simple Navbar -->
    <nav>
        <div class="nav-container">
            <div class="nav-menu">
                <a href="index.html" class="logo-link"><img src="images/logo.png?v=2" alt="ReadChill" class="logo-img"></a>
                <a href="index.html"><ion-icon name="home-outline"></ion-icon> หน้าแรก</a>
            </div>
            <div class="nav-actions">
                <button id="theme-toggle" class="icon-btn" title="เปลี่ยนธีม"><ion-icon name="sunny-outline"></ion-icon></button>
                <button id="hamburger-btn" class="icon-btn hamburger-btn" title="เมนู"><ion-icon name="menu-outline"></ion-icon></button>
            </div>
        </div>
    </nav>

    <!-- Auth Section -->
    <main class="auth-page-bg">
        <div class="auth-box">
            <h2>สมัครสมาชิก</h2>
            <p class="auth-subtitle">สร้างบัญชีใหม่เพื่อเริ่มอ่านและบันทึกเรื่องโปรด</p>
            
            <!-- Email / Password Form -->
            <div id="email-auth-container" style="margin-bottom: 1.5rem; text-align: left;">
                <input type="text" id="reg-name-input" placeholder="ชื่อผู้ใช้" style="width: 100%; padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                <input type="email" id="reg-email-input" placeholder="อีเมล" style="width: 100%; padding: 0.75rem; margin-bottom: 0.75rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                <input type="password" id="reg-password-input" placeholder="รหัสผ่าน (อย่างน้อย 6 ตัวอักษร)" style="width: 100%; padding: 0.75rem; margin-bottom: 1rem; border-radius: 8px; border: 1px solid var(--border-color); background: var(--card-bg); color: var(--text-primary);">
                
                <button id="email-register-btn" class="btn-primary" style="width: 100%; justify-content: center; background-color: var(--primary-color);">ยืนยันสมัครสมาชิก</button>
                
                <div style="text-align: center; margin-top: 1rem;">
                    <span style="color: var(--text-secondary); font-size: 0.9rem;">มีบัญชีอยู่แล้วใช่ไหม? <a href="login.html" style="color: var(--primary-color); text-decoration: none; font-weight: bold;">เข้าสู่ระบบ</a></span>
                </div>
            </div>
            
            <div style="display: flex; align-items: center; text-align: center; margin-bottom: 1.5rem;">
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
                <span style="margin: 0 10px; color: var(--text-secondary); font-size: 0.9rem;">หรือ</span>
                <div style="flex: 1; height: 1px; background: var(--border-color);"></div>
            </div>

            <!-- Google Sign In Button -->
            <button id="google-signin-btn" class="auth-btn-google" style="margin-bottom: 1rem; width: 100%; justify-content: center;">
                <img src="https://www.gstatic.com/firebasejs/ui/2.0.0/images/auth/google.svg" alt="Google" class="google-icon">
                ดำเนินการต่อด้วย Google
            </button>
            

            <!-- Error Message -->
            <p id="auth-error" class="hidden" style="color: var(--danger); margin-top: 1.5rem; font-size: 0.9rem; background: rgba(255, 75, 75, 0.1); padding: 0.5rem; border-radius: 8px; border: 1px solid rgba(255, 75, 75, 0.2);"></p>
        </div>
    </main>

    <!-- Mobile Sidebar -->
    <div id="sidebar-overlay" class="sidebar-overlay"></div>
    <div id="mobile-sidebar" class="sidebar">
        <div class="sidebar-header">
            <span class="sidebar-logo">ReadChill</span>
            <button id="sidebar-close" class="sidebar-close"><ion-icon name="close-outline"></ion-icon></button>
        </div>
        <div class="sidebar-profile">
            <img src="https://ui-avatars.com/api/?name=Guest" id="sidebar-profile-img" alt="Profile" referrerpolicy="no-referrer">
            <div class="sidebar-profile-info">
                <h4 id="sidebar-profile-name">ผู้เยี่ยมชม</h4>
                <p id="sidebar-profile-email">กรุณาเข้าสู่ระบบ</p>
            </div>
        </div>
        <div class="sidebar-menu">
            <a href="index.html"><ion-icon name="home-outline"></ion-icon> หน้าแรก</a>
            <a href="search.html"><ion-icon name="search-outline"></ion-icon> ค้นหา</a>
            <a href="topup.html"><ion-icon name="card-outline"></ion-icon> เติมเหรียญ</a>
            <a href="library.html"><ion-icon name="library-outline"></ion-icon> คลังของฉัน</a>
            <a href="request.html"><ion-icon name="chatbubbles-outline"></ion-icon> ติดต่อเรา</a>
            <div class="sidebar-divider"></div>
            <a href="login.html" id="sidebar-login-btn" class="active"><ion-icon name="log-in-outline"></ion-icon> เข้าสู่ระบบ</a>
            <a href="partner.html" id="sidebar-partner-link" class="hidden" style="color: var(--text-primary);"><ion-icon name="pencil" style="font-size: 1.3rem; vertical-align: middle;"></ion-icon></a>
            <a href="admin.html" id="sidebar-admin-link" class="hidden" style="color: var(--text-primary);"><ion-icon name="settings-outline"></ion-icon> จัดการหลังบ้าน</a>
            <a href="#" id="sidebar-logout-btn" class="hidden" style="color: var(--danger);"><ion-icon name="log-out-outline"></ion-icon> ออกจากระบบ</a>
        </div>

    <!-- Bottom Navigation (Mobile) -->
    <div class="bottom-nav">
        <a href="index.html" class="bottom-nav-item">
            <ion-icon name="home-outline"></ion-icon>
            <span>หน้าแรก</span>
        </a>
        <a href="search.html" class="bottom-nav-item">
            <ion-icon name="search-outline"></ion-icon>
            <span>ค้นหา</span>
        </a>
        <a href="library.html" class="bottom-nav-item">
            <ion-icon name="library-outline"></ion-icon>
            <span>คลังของฉัน</span>
        </a>
    </div>

    <!-- Firebase Scripts -->
    <script type="module" src="js/firebase.js?v=2"></script>
    <script type="module" src="js/auth.js?v=4"></script>
    <script src="js/theme.js?v=3"></script>
</body>
</html>
